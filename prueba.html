<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Externo Elegante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .video-container {
            max-width: 800px;
            width: 100%;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            margin-top: 10vw;
        }

        .video-container:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .video-header {
            background: #343a40;
            color: #fff;
            padding: 1rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .video-body {
            padding: 1rem;
        }

        .video-iframe {
            width: 100%;
            height: 450px;
            border: none;
        }

        @media (max-width: 576px) {
            .video-iframe {
                height: 300px;
            }
        }
    </style>
</head>

<body>
    <div class="mosaico">
        <div class="video-header">Video Externo Elegante</div>
        <div class="">
            <iframe class="" src="https://www.youtube.com/embed/tu_video_id" allowfullscreen></iframe>
        </div>
    </div>
</body>

</html>
